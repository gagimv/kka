name: MissAV detail all Scrape (Stable)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      HEADLESS: true
      CHROME_VERSION: "124.0.6367.91"

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install undetected-chromedriver==3.5.5 selenium==4.15.2 certifi

      - name: Setup Chrome (指定版本)
        uses: browser-actions/setup-chrome@v1
        with:
          browser: chrome
          chrome-version: ${{ env.CHROME_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 \
            libasound2t64 libx11-xcb1 libxcb-dri3-0 libxcb1

      - name: Locate Chrome binary
        run: |
          for p in /opt/google/chrome/chrome /usr/bin/google-chrome \
                   /usr/bin/google-chrome-stable /usr/bin/chromium-browser; do
            if [ -x "$p" ]; then
              echo "CHROME_BIN=$p" >> $GITHUB_ENV
              break
            fi
          done
          if [ -z "$CHROME_BIN" ]; then
            CHROME_BIN=$(which google-chrome || which chrome || which chromium-browser)
            echo "CHROME_BIN=$CHROME_BIN" >> $GITHUB_ENV
          fi
          echo "Using Chrome: $CHROME_BIN"

      - name: Verify Chrome
        run: |
          $CHROME_BIN --version
          timeout 10 $CHROME_BIN --headless=new --disable-gpu --no-sandbox \
            --disable-dbus --dump-dom https://example.com || true

      # 删除了 Generate urls.txt from log.db 步骤

      - name: Run scraper
        run: python all.py

      - name: Upload databases
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: databases
          path: videos.db
