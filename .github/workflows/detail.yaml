name: MissAV detail Scrape (Stable)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      HEADLESS: true
      LIST_MODE: incremental
      # START_PAGE: 1
      # END_PAGE: 10
      # RESCRAPE: true
      CHROME_VERSION: "124.0.6367.91"   # 与 undetected-chromedriver 3.5.5 兼容

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install undetected-chromedriver==3.5.5 selenium==4.15.2 certifi

      - name: Setup Chrome (指定稳定版本)
        uses: browser-actions/setup-chrome@v1
        with:
          browser: chrome
          chrome-version: ${{ env.CHROME_VERSION }}

      - name: Install all system dependencies for Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 \
            libasound2t64 libx11-xcb1 libxcb-dri3-0 libxcb1

      - name: Verify Chrome installation
        run: |
          echo "Chrome binary: $CHROME_PATH"
          $CHROME_PATH --version
          # 快速测试 Chrome 能否正常启动 (headless)
          timeout 10 $CHROME_PATH --headless --disable-gpu --no-sandbox --dump-dom https://example.com || true

      - name: Generate urls.txt from log.db
        run: |
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('log.db')
          cur = conn.execute('SELECT url FROM pending')
          urls = [row[0] for row in cur.fetchall()]
          conn.close()
          if not urls:
              print('No pending URLs found, exiting.')
              exit(1)
          with open('urls.txt', 'w') as f:
              f.write('\n'.join(urls))
          print(f'Written {len(urls)} URLs to urls.txt')
          "

      - name: Run scraper
        env:
          CHROME_BIN: ${{ env.CHROME_PATH }}
        run: python detail_scraper_v2.3.py

      - name: Upload databases
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: databases
          path: |
            videos.db
