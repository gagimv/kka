name: MissAV detail Scrape (Stable)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      HEADLESS: true
      LIST_MODE: incremental
      CHROME_VERSION: "124.0.6367.91"

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install undetected-chromedriver==3.5.5 selenium==4.15.2 certifi

      - name: Setup Chrome (指定版本)
        uses: browser-actions/setup-chrome@v1
        with:
          browser: chrome
          chrome-version: ${{ env.CHROME_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 \
            libasound2t64 libx11-xcb1 libxcb-dri3-0 libxcb1

      # ✅ 自动探测 Chrome 路径（硬编码备选 + which 兜底）
      - name: Locate Chrome binary
        run: |
          # 优先检查 setup-chrome 的典型安装位置
          CHROME_PATHS=(
            "/opt/google/chrome/chrome"
            "/usr/bin/google-chrome"
            "/usr/bin/google-chrome-stable"
            "/usr/bin/chromium-browser"
            "/usr/local/bin/google-chrome"
          )
          FOUND=""
          for p in "${CHROME_PATHS[@]}"; do
            if [ -x "$p" ]; then
              FOUND="$p"
              break
            fi
          done
          # 如果都没找到，尝试系统 PATH
          if [ -z "$FOUND" ]; then
            FOUND=$(which google-chrome || which chrome || which chromium-browser || true)
          fi
          if [ -z "$FOUND" ]; then
            echo "❌ Chrome 二进制未找到！"
            exit 1
          fi
          echo "✅ 使用 Chrome: $FOUND"
          echo "CHROME_BIN=$FOUND" >> $GITHUB_ENV

      - name: Verify Chrome
        run: |
          echo "Chrome binary: $CHROME_BIN"
          $CHROME_BIN --version
          timeout 10 $CHROME_BIN --headless --disable-gpu --no-sandbox --dump-dom https://example.com || true

      - name: Generate urls.txt from log.db
        run: |
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('log.db')
          cur = conn.execute('SELECT url FROM pending')
          urls = [row[0] for row in cur.fetchall()]
          conn.close()
          if not urls:
              print('No pending URLs found, exiting.')
              exit(1)
          with open('urls.txt', 'w') as f:
              f.write('\n'.join(urls))
          print(f'Written {len(urls)} URLs to urls.txt')
          "

      - name: Run scraper
        run: python detail_scraper_v2.3.py

      - name: Upload databases
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: databases
          path: |
            videos.db
